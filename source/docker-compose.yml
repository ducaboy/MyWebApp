version: '3.8'

services:

  activemq:
    image: rmohr/activemq
    container_name: activemq
    ports:
      - "61616:61616"
      - "8161:8161"

  api-service:
    build: ./api-service
    container_name: api-service
    ports:
      - "8080:8080"
    depends_on:
      - activemq
    environment:
      SPRING_ACTIVEMQ_BROKER_URL: tcp://activemq:61616
      SPRING_ACTIVEMQ_USER: admin
      SPRING_ACTIVEMQ_PASSWORD: admin